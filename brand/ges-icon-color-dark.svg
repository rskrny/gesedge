<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- GES Logomark: Three overlapping petals forming a circular bridge symbol -->
  <!-- Represents East-West-Global convergence -->

  <!-- Left petal (West / warm rose) -->
  <path d="M180 128
    C120 160, 80 220, 80 280
    C80 360, 140 420, 220 420
    C260 420, 290 390, 300 360
    C260 380, 200 380, 170 340
    C140 300, 140 220, 180 128Z"
    fill="#D4467A" opacity="0.85"/>

  <!-- Right petal (East / muted teal) -->
  <path d="M332 128
    C392 160, 432 220, 432 280
    C432 360, 372 420, 292 420
    C252 420, 222 390, 212 360
    C252 380, 312 380, 342 340
    C372 300, 372 220, 332 128Z"
    fill="#4A9EBF" opacity="0.85"/>

  <!-- Top petal (Global / soft lavender) -->
  <path d="M256 72
    C200 72, 148 108, 130 160
    C112 212, 128 268, 172 304
    C192 280, 220 240, 256 220
    C292 240, 320 280, 340 304
    C384 268, 400 212, 382 160
    C364 108, 312 72, 256 72Z"
    fill="#9B85C4" opacity="0.8"/>

  <!-- Center overlap glow (lighter blend where all three meet) -->
  <ellipse cx="256" cy="260" rx="50" ry="55" fill="#F0EFE9" opacity="0.15"/>
</svg>
